naftiko: 1.0.0-alpha2
info:
  label: World News API — Sources
  description: 'World News API — Sources. 3 operations. Lead operation: Website to RSS Feed. Self-contained Naftiko capability
    covering one World News Api business surface.'
  tags:
  - World News Api
  - Sources
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORLD_NEWS_API_API_KEY: WORLD_NEWS_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: world-news-sources
    baseUri: https://api.worldnewsapi.com
    description: World News API — Sources business capability. Self-contained, no shared references.
    resources:
    - name: feed.rss
      path: /feed.rss
      operations:
      - name: get
        method: GET
        description: Website to RSS Feed
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search-news-sources
      path: /search-news-sources
      operations:
      - name: get
        method: GET
        description: Search News Sources
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: suggest-news-source
      path: /suggest-news-source
      operations:
      - name: post
        method: POST
        description: Suggest News Source
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: api-key
      value: '{{env.WORLD_NEWS_API_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: world-news-sources-rest
    port: 8080
    description: REST adapter for World News API — Sources. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/feed-rss
      name: feed-rss
      description: REST surface for feed.rss.
      operations:
      - method: GET
        name: get
        description: Website to RSS Feed
        call: world-news-sources.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search-news-sources
      name: search-news-sources
      description: REST surface for search-news-sources.
      operations:
      - method: GET
        name: get
        description: Search News Sources
        call: world-news-sources.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/suggest-news-source
      name: suggest-news-source
      description: REST surface for suggest-news-source.
      operations:
      - method: POST
        name: post
        description: Suggest News Source
        call: world-news-sources.post
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: world-news-sources-mcp
    port: 9090
    transport: http
    description: MCP adapter for World News API — Sources. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: website-rss-feed
      description: Website to RSS Feed
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: world-news-sources.get
      outputParameters:
      - type: object
        mapping: $.
    - name: search-news-sources
      description: Search News Sources
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: world-news-sources.get
      outputParameters:
      - type: object
        mapping: $.
    - name: suggest-news-source
      description: Suggest News Source
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: world-news-sources.post
      outputParameters:
      - type: object
        mapping: $.
